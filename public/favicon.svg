<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="#9a7b2e" stroke-width="1.2"/>
  <!-- Gold diamond accent -->
  <rect x="15" y="4" width="4" height="4" rx="0.5" fill="#c9a84c" transform="rotate(45 17 6)"/>
  <!-- D letterform -->
  <text x="5" y="24" font-family="Georgia, serif" font-size="19" font-weight="400" fill="#c9a84c" letter-spacing="-1">D</text>
  <!-- W letterform -->
  <text x="15" y="24" font-family="Georgia, serif" font-size="13" font-weight="300" fill="#9a7b2e" letter-spacing="-0.5">W</text>
</svg>
